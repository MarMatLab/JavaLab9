version: '3.8'
services:
  mysql-books:
    hostname: mysql
    image: mysql:8.0
    cap_add:
      - SYS_NICE
    restart: always
    environment:
      - MYSQL_DATABASE=vod
      - MYSQL_ROOT_PASSWORD=mysql
    ports:
      - '3306:3306'
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
  ms-movies-1:
    image: ms-movies-1.0
    ports:
      - 8090:8090
  ms-movies-2:
    image: ms-movies-1.0
    ports:
      - 8091:8090

